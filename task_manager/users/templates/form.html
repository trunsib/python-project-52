{% load bootstrap5 %}
<!DOCTYPE html>
<html>
<head>
    <title>User Form</title>
    {% bootstrap_css %}
</head>
<body class="container mt-4">
    <h1>User Form</h1>
    <form method="post">
        {% csrf_token %}
        {% bootstrap_form form %}
        <button type="submit" class="btn btn-success">Save</button>
    </form>
</body>
</html>
