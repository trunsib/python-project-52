{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Удаление статуса</h2>
    
    <p>Вы уверены, что хотите удалить статус "{{ status.name }}"?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Да, удалить</button>
        <a href="{% url 'statuses' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
