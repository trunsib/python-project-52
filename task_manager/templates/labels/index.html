{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Метки</h2>
    <a href="{% url 'label_create' %}" class="btn btn-primary mb-3">Создать метку</a>
    
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Дата создания</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for label in labels %}
            <tr>
                <td>{{ label.id }}</td>
                <td>{{ label.name }}</td>
                <td>{{ label.created_at|date:"d.m.Y" }}</td>
                <td>
                    <a href="{% url 'label_update' label.id %}" class="btn btn-sm btn-secondary">Изменить</a>
                    <a href="{% url 'label_delete' label.id %}" class="btn btn-sm btn-danger">Удалить</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="text-center">Нет меток</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
