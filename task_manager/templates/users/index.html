{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Пользователи</h2>
    
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Имя пользователя</th>
                <th>Полное имя</th>
                <th>Дата создания</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.id }}</td>
                <td>{{ user.username }}</td>
                <td>{{ user.get_full_name }}</td>
                <td>{{ user.date_joined|date:"d.m.Y" }}</td>
                <td>
                    <a href="{% url 'user_update' user.id %}" class="btn btn-sm btn-secondary">Изменить</a>
                    <a href="{% url 'user_delete' user.id %}" class="btn btn-sm btn-danger">Удалить</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
