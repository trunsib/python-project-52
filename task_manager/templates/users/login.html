{% extends "base.html" %}

{% block content %}

<h1>Вход</h1>

<form method="post">
  {% csrf_token %}

  <div>
    <label for="id_username">Имя пользователя</label>
    {{ form.username }}
  </div>

  <div>
    <label for="id_password">Пароль</label>
    {{ form.password }}
  </div>

  <button type="submit">Войти</button>

</form>

{% endblock %}
