{% load bootstrap5 %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    {% bootstrap_css %}
    {% bootstrap_javascript jquery='full' %}
</head>
<body>
<div class="container mt-5">
    <h1>Users</h1>
    <a class="btn btn-primary mb-3" href="{% url 'users:create' %}">Create User</a>
    <table class="table table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        {% for user in object_list %}
        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
            <td>
                <a class="btn btn-sm btn-warning" href="{% url 'users:update' user.pk %}">Edit</a>
                <a class="btn btn-sm btn-danger" href="{% url 'users:delete' user.pk %}">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="4">No users found.</td></tr>
        {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
