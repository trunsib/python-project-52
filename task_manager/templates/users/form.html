{% extends "base.html" %}

{% block content %}

<h1>Регистрация</h1>

<form method="post">
  {% csrf_token %}

  <div>
    <label for="id_first_name">Имя</label>
    {{ form.first_name }}
  </div>

  <div>
    <label for="id_last_name">Фамилия</label>
    {{ form.last_name }}
  </div>

  <div>
    <label for="id_username">Имя пользователя</label>
    {{ form.username }}
  </div>

  <div>
    <label for="id_password">Пароль</label>
    {{ form.password }}
  </div>

  <div>
    <label for="id_password_confirm">Подтверждение пароля</label>
    {{ form.password_confirm }}
  </div>

  <button type="submit">Зарегистрировать</button>
</form>

{% endblock %}
