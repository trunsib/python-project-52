{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Статусы</h2>
    <a href="{% url 'status_create' %}" class="btn btn-primary mb-3">Создать статус</a>
    
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Дата создания</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for status in statuses %}
            <tr>
                <td>{{ status.id }}</td>
                <td>{{ status.name }}</td>
                <td>{{ status.created_at|date:"d.m.Y" }}</td>
                <td>
                    <a href="{% url 'status_update' status.id %}" class="btn btn-sm btn-secondary">Изменить</a>
                    <a href="{% url 'status_delete' status.id %}" class="btn btn-sm btn-danger">Удалить</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="text-center">Нет статусов</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
